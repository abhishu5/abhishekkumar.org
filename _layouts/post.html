<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-B5NF138030"></script>
  <script>
   window.dataLayer = window.dataLayer || [];
   function gtag(){dataLayer.push(arguments);}
   gtag('js', new Date());

   gtag('config', 'G-B5NF138030');
  </script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ page.title }} | Abhishek Kumar</title>

<meta name="description" content="{{ page.description }}">

<link rel="canonical" href="https://abhishekkumar.org{{ page.url }}">

<meta name="robots" content="index, follow">

<meta property="og:type" content="article">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:url" content="https://abhishekkumar.org{{ page.url }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.description }}">

<link rel="stylesheet" href="/style.css">

<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

<style>

.article-hero{
  padding:10rem 0 6rem;
  border-bottom:0.5px solid var(--border);
}

.article-hero-inner{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:0 2rem;
}

.article-label{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:2.2rem;
  display:block;
}

.article-title{
  font-size:clamp(3rem,5vw,5rem);
  line-height:0.96;
  letter-spacing:-0.065em;
  font-weight:500;
  color:var(--text);
  max-width:760px;
  margin:0;
}

.article-meta{
  margin-top:2rem;
  font-size:.95rem;
  color:var(--text3);
}

.article-content{
  width:100%;
  max-width:760px;
  margin:0 auto;
  padding:5rem 2rem 7rem;
}

.article-content p{
  font-size:1.06rem;
  line-height:1.95;
  color:var(--text2);
  margin-bottom:2rem;
}

.article-content h2{
  font-size:2rem;
  line-height:1.1;
  letter-spacing:-0.04em;
  font-weight:500;
  margin:5rem 0 2rem;
  color:var(--text);
}

.article-content h3{
  font-size:1.35rem;
  font-weight:500;
  margin:3rem 0 1rem;
  color:var(--text);
}

.article-content ul,
.article-content ol{
  padding-left:1.3rem;
  margin-bottom:2rem;
}

.article-content li{
  color:var(--text2);
  line-height:1.9;
  margin-bottom:1rem;
}

.article-content strong{
  color:var(--text);
  font-weight:500;
}

.article-content a{
  color:var(--text);
  text-decoration:none;
  border-bottom:1px solid var(--border);
}

.article-pagination{
  margin-top:6rem;
  padding-top:3rem;
  border-top:0.5px solid var(--border);

  display:flex;
  justify-content:space-between;
  gap:2rem;
  flex-wrap:wrap;
}

.article-pagination a{
  color:var(--text);
  text-decoration:none;
  transition:.2s ease;
}

.article-pagination a:hover{
  opacity:.65;
}

@media (max-width:900px){

  .article-hero{
    padding:8rem 0 5rem;
  }

  .article-title{
    font-size:clamp(2.5rem,11vw,4rem);
    line-height:1;
  }

  .article-content{
    padding:4rem 1.5rem 6rem;
  }

}

</style>

</head>

<body>

<header class="nav">

  <div class="logo">
    <a href="/">abhishekkumar.org</a>
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/services.html">Services</a>
    <a href="/methodology.html">Methodology</a>
    <a href="/about.html">About</a>
    <a href="/blog/">Writing</a>
    <a href="/contact.html">Contact</a>
  </nav>

  <button id="theme-toggle" class="theme-toggle">
    ☾
  </button>

</header>

<main>

<section class="article-hero">

  <div class="article-hero-inner">

    <span class="article-label">
      AI SEARCH VISIBILITY
    </span>

    <h1 class="article-title">
      {{ page.title }}
    </h1>

    <div class="article-meta">
      Published {{ page.date | date: "%B %d, %Y" }}
    </div>

  </div>

</section>

<section class="article-content">

  {{ content }}

  <div class="article-pagination">

    {% if page.previous.url %}
    <a href="{{ page.previous.url }}">
      ← Previous article
    </a>
    {% endif %}

    {% if page.next.url %}
    <a href="{{ page.next.url }}">
      Next article →
    </a>
    {% endif %}

  </div>

</section>

</main>

<footer class="footer">
  © 2026 Abhishek Kumar
</footer>

<script>

const toggle = document.getElementById('theme-toggle');

toggle.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');
});

</script>

</body>
</html>
