<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ page.title }} | Abhishek Kumar</title>

<meta name="description" content="{{ page.description }}">

<link rel="canonical" href="https://abhishekkumar.org{{ page.url }}">

<meta name="robots" content="index, follow">

<meta property="og:type" content="article">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:url" content="https://abhishekkumar.org{{ page.url }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title }}">
<meta name="twitter:description" content="{{ page.description }}">

<link rel="stylesheet" href="/style.css">

<link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

<style>

:root{
  --bg:#050505;
  --surface:#0b0b0b;
  --border:#1a1a1a;
  --text:#f5f5f5;
  --text2:#a1a1aa;
  --text3:#6b7280;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

a{
  color:inherit;
  text-decoration:none;
}

.nav{
  height:60px;
  border-bottom:0.5px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 2rem;
}

.logo a{
  font-size:.95rem;
  font-weight:600;
  letter-spacing:-0.03em;
}

nav{
  display:flex;
  gap:2.5rem;
}

nav a{
  font-size:.78rem;
  color:var(--text2);
  transition:.2s ease;
}

nav a:hover{
  color:var(--text);
}

.article-hero{
  padding:8rem 0 5rem;
  border-bottom:0.5px solid var(--border);
}

.article-wrap{
  width:min(100%,760px);
  margin:0 auto;
  padding:0 2rem;
}

.article-label{
  font-size:.72rem;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:2.2rem;
}

.article-hero h1{
  font-size:clamp(3rem,6vw,5.8rem);
  line-height:.95;
  font-weight:400;
  letter-spacing:-0.07em;
  max-width:900px;
}

.article-shift{
  display:block;
  margin-top:1.8rem;
}

.article-meta{
  margin-top:2.5rem;
  color:var(--text3);
  font-size:.95rem;
}

.article-content{
  padding:5rem 0 7rem;
}

.article-content p{
  font-size:1.08rem;
  line-height:1.95;
  color:#d4d4d8;
  margin-bottom:1.7rem;
}

.article-content h2{
  font-size:2rem;
  line-height:1.1;
  letter-spacing:-0.05em;
  margin-top:5rem;
  margin-bottom:1.5rem;
  font-weight:500;
}

.article-content h3{
  font-size:1.3rem;
  margin-top:3rem;
  margin-bottom:1rem;
  font-weight:500;
}

.article-content ul,
.article-content ol{
  margin:2rem 0;
  padding-left:1.4rem;
}

.article-content li{
  color:#d4d4d8;
  margin-bottom:1rem;
  line-height:1.9;
}

.article-content strong{
  color:#fff;
  font-weight:500;
}

.article-content blockquote{
  border-left:1px solid var(--border);
  padding-left:1.5rem;
  margin:3rem 0;
  color:#c4c4c7;
  font-size:1.1rem;
  line-height:1.9;
}

.article-content code{
  background:#101010;
  border:1px solid var(--border);
  padding:.15rem .4rem;
  border-radius:4px;
  font-size:.92rem;
}

.article-content pre{
  overflow:auto;
  padding:1.5rem;
  border:1px solid var(--border);
  background:#0b0b0b;
  margin:2rem 0;
}

.article-content pre code{
  border:none;
  padding:0;
  background:transparent;
}

.article-content hr{
  border:none;
  border-top:.5px solid var(--border);
  margin:5rem 0;
}

.footer{
  border-top:0.5px solid var(--border);
  padding:2rem;
  color:var(--text3);
  font-size:.85rem;
}

@media(max-width:768px){

  .nav{
    padding:0 1rem;
  }

  nav{
    gap:1rem;
  }

  nav a{
    font-size:.72rem;
  }

  .article-hero{
    padding:5rem 0 4rem;
  }

  .article-wrap{
    padding:0 1.25rem;
  }

  .article-hero h1{
    font-size:clamp(2.7rem,12vw,4.5rem);
    line-height:1;
  }

  .article-shift{
    margin-top:1.2rem;
  }

  .article-content{
    padding:4rem 0 5rem;
  }

  .article-content p{
    font-size:1rem;
    line-height:1.85;
  }

  .article-content h2{
    font-size:1.7rem;
  }

}

</style>

</head>

<body>

<header class="nav">

  <div class="logo">
    <a href="/">abhishekkumar.org</a>
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/services.html">Services</a>
    <a href="/methodology.html">Methodology</a>
    <a href="/about.html">About</a>
    <a href="/blog/">Writing</a>
    <a href="/contact.html">Contact</a>
  </nav>

</header>

<main>

<section class="article-hero">

  <div class="article-wrap">

    <div class="article-label">
      AI SEARCH VISIBILITY
    </div>

    <h1>
      {{ page.title }}
    </h1>

    <div class="article-meta">
      Published {{ page.date | date: "%B %d, %Y" }}
    </div>

  </div>

</section>

<section class="article-content">

  <div class="article-wrap">

    {{ content }}

  </div>

</section>

</main>

<footer class="footer">
  © 2026 Abhishek Kumar
</footer>

</body>
</html>
